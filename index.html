<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <title>Interactive pricing component</title>
  <link rel="stylesheet" href="src/output.css">
  <link rel="stylesheet" href="style.css">
  <script src="./app.js" defer></script>
</head>
<style> 
  .colr-1 {color: #a5f3eb}
  .colr-1 {color: #10d5c2}
  .colr-1 {color: #0fa5ad}
  .colr-1 {color: #feece7}
  .colr-1 {color: #ff8c66}
  .colr-1 {color: #bdccff}
  .colr-1 {color: #ffffff}
  .colr-1 {color: #fafbff}
  .colr-1 {color: #eaeefb}
  .colr-1 {color: #cdd7ee}
  .colr-1 {color: #858fad}
  .colr-1 {color: #293356}
</style>
<body class="min-w-[375px] bg-[#fafbff] h-screen bg-[url('/images/bg-pattern.svg')] bg-no-repeat lg:bg-contain p-5">
  <div class="title py-[100px] rounded-bl-[200px] bg-[url('/images/pattern-circles.svg')] bg-no-repeat bg-[center_center] flex flex-col items-center gap-4">
    <span class="text-[#293356] font-bold text-xl">Simple, traffic-based pricing</span>
    <p class="text-[15px] text-[#858fad] px-[70px] text-center">Sign-up for our 30-day trial. No credit card required.</p>
  </div>
  <div class="card-contianer mx-auto bg-white max-w-[540px] rounded-xl py-7 flex flex-col gap-10 divide-y-[1px] shadow-[0px_10px_20px_0px_rgba(0,0,0,0.1)]">
    <div class="top-section px-9 grid grid-cols-1 sm:grid-cols-2 gap-8 sm:gap-9 justify-center text-center sm:text-left">
      <div class="pageviews">
        <span class="text-[#858fad] text-sm font-semibold capitalize tracking-widest"><span class="view-number">100K</span> Pageviews</span>
      </div>
      <div class="pricing-nav h-[40px] flex items-center justify-center w-full col-span-full relative">
        <input class="nav-bar w-full" type="range" name="" id="" max="100" min="0">
      </div>
      <div class="price flex items-center justify-center gap-1 sm:col-start-2 sm:row-start-1 sm:justify-end">
        <span class="current-price text-[#293356] text-3xl font-bold">$16.00</span>
        <span class="text-[#858fad] text-sm">/ month</span>
      </div>
      <div class="monthly-billing col-span-full flex gap-3 mx-auto pr-9 text-[13px] text-[#858fad]">
        <div class="flex gap-3">
          <span class="">Monthly Billing</span>
          <div class="btn h-[20px] w-[40px] bg-[#cdd7ee] rounded-[50px] flex items-center relative">
            <div class="btn-handler size-[14px] rounded-full bg-white cursor-pointer absolute left-1 translate-x-[0px] transition-all duration-300 ease-out"></div>
          </div>
        </div>
        <div class="flex">
          <span class="relative after:content-['-25%'] after:absolute after:w-fit after:px-1 after:py-[2px] after:text-[#ff8c66] after:bg-[#feece7] after:rounded-lg after:font-semibold after:text-[10px] after:right-[-44px]">Yearly Billing</span>
        </div>
      </div>
    </div>
    <div class="botton-section px-9 pt-8 grid grid-cols-1 sm:grid-cols-2 justify-items-center gap-6 text-center">
      <div class="features sm:justify-self-start">
        <ul class="text-[13px] text-[#858fad] text-center">
          <li class="flex w-full items-center gap-3"><img src="images/icon-check.svg" alt=""><span class="">Unlimited websites</span></li>
          <li class="flex w-full items-center gap-3"><img src="images/icon-check.svg" alt=""><span class="">100% data ownership</span></li>
          <li class="flex w-full items-center gap-3"><img src="images/icon-check.svg" alt=""><span class="">Email reports</span></li>
        </ul>
      </div>
      <div class="start-btn sm:justify-self-end size-full cursor-pointer bg-[#293356] text-[#bdccff] hover:text-white transition-colors duration-300 ease-out w-fit h-[45px] text-[13px] rounded-[30px] px-10 font-medium py-3 self-center">
        <button class="size-full">Start my trial</button>
      </div>
    </div>
  </div>
  <div class="attribution text-center absolute bottom-0 text-sm left-[50%] translate-x-[-50%]">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Mohammad Amini</a>.
  </div>
</body>
</html>
