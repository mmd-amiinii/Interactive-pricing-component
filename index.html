<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <title>Interactive pricing component</title>
  <link rel="stylesheet" href="src/output.css">
  <script src="./app.js"></script>
</head>
<style> 
  .colr-1 {color: #a5f3eb}
  .colr-1 {color: #10d5c2}

<body class="bg-[#eaeefb] min-w-[375px]">
  <div class="title">
    <span class="">Simple, traffic-based pricing</span>
    <p class=""Sign-up for our 30-day trial. No credit card required. ></p>
  </div>
  <div class="card-contianer bg-white">
    <div class="top-section">
      <div class="pageviews">
        <span class="">Pageviews</span>
      </div>
      <div class="pricing-nav">
        <div class="nav"></div>
        <div class="nav-handler"></div>
      </div>
      <div class="price">
        <p class=""><span class="current-price">$16.00</span> / month</p>
      </div>
      <div class="monthly-billing">
        <div class="">
          <span class="">Monthly Billing</span>
          <div class="btn"></div>
        </div>
        <div class="">
          <span class="">Yearly Billing</span>
          <span class="">25% discount</span>
        </div>
      </div>
    </div>
    <div class="botton-section">
      <div class="features">
        <ul class="">
          <li><img src="images/icon-check.svg" alt=""><span class="">Unlimited websites</span></li>
          <li><img src="images/icon-check.svg" alt=""><span class="">100% data ownership</span></li>
          <li><img src="images/icon-check.svg" alt=""><span class="">Email reports</span></li>
        </ul>
      </div>
      <div class="start-btn size-full">
        <button class="">Start my trial</button>
      </div>
    </div>
  </div>
